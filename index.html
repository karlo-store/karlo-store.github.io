<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARLO STORE | كارلو ستور للشحن</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d2ff; --secondary: #9d50bb; --bg: #05070a; --card: #0f121a; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #e2e8f0; margin: 0; overflow-x: hidden; }
        header { background: #0f121a; padding: 25px; text-align: center; border-bottom: 2px solid var(--primary); box-shadow: 0 0 20px rgba(0, 210, 255, 0.3); }
        .logo { font-size: 32px; font-weight: 900; color: #fff; text-shadow: 0 0 15px var(--primary); }
        .nav-tabs { display: flex; justify-content: center; background: #111; padding: 10px; gap: 10px; overflow-x: auto; }
        .tab-btn { background: none; border: 1px solid #333; color: #ccc; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-family: 'Cairo'; white-space: nowrap; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: #000; font-weight: bold; box-shadow: 0 0 15px var(--primary); }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .section { display: none; animation: fadeIn 0.5s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 15px; padding: 20px; text-align: center; transition: 0.3s; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .price-tag { font-size: 22px; color: var(--primary); font-weight: bold; display: block; margin: 15px 0; }
        .btn-buy { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; border: none; padding: 12px 25px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-family: 'Cairo'; }
        .wa-float { position: fixed; bottom: 20px; left: 20px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 20px rgba(37, 211, 102, 0.5); z-index: 1000; }
    </style>
</head>
<body>

<header><div class="logo">KARLO STORE</div></header>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="openTab(event, 'home')">🏠 الرئيسية</button>
    <button class="tab-btn" onclick="openTab(event, 'recharge')">💎 شحن الألعاب</button>
    <button class="tab-btn" onclick="openTab(event, 'payment')">💳 طرق الدفع</button>
</div>

<div class="container">
    <div id="home" class="section active">
        <div style="text-align: center; padding: 50px 0;">
            <h1>مرحباً بك في <span style="color: var(--primary);">كارلو ستور</span></h1>
            <p>أسرع خدمة شحن ألعاب في ليبيا 🇱🇾</p>
            <button class="btn-buy" style="width: auto; padding: 15px 40px;" onclick="document.querySelectorAll('.tab-btn')[1].click()">ابدأ الشحن الآن 🚀</button>
        </div>
    </div>

    <div id="recharge" class="section">
        <h2 style="border-right: 4px solid var(--primary); padding-right: 15px;">خدمات الشحن المتوفرة</h2>
        <h3>🔥 فري فاير</h3>
        <div class="grid">
            <div class="card"><span>110 💎</span> <span class="price-tag">12.5 د.ل</span> <button class="btn-buy" onclick="sendOrder('فري فاير', '110 جوهرة', '12.5')">اطلب الآن ⚡</button></div>
            <div class="card"><span>231 💎</span> <span class="price-tag">26 د.ل</span> <button class="btn-buy" onclick="sendOrder('فري فاير', '231 جوهرة', '26')">اطلب الآن ⚡</button></div>
            <div class="card"><span>583 💎</span> <span class="price-tag">61 د.ل</span> <button class="btn-buy" onclick="sendOrder('فري فاير', '583 جوهرة', '61')">اطلب الآن ⚡</button></div>
        </div>
        <h3 style="margin-top: 30px;">🔫 ببجي موبايل</h3>
        <div class="grid">
            <div class="card"><span>60 UC</span> <span class="price-tag">13 د.ل</span> <button class="btn-buy" onclick="sendOrder('ببجي', '60 شدة', '13')">اطلب الآن ⚡</button></div>
            <div class="card"><span>325 UC</span> <span class="price-tag">64 د.ل</span> <button class="btn-buy" onclick="sendOrder('ببجي', '325 شدة', '64')">اطلب الآن ⚡</button></div>
            <div class="card"><span>660 UC</span> <span class="price-tag">125 د.ل</span> <button class="btn-buy" onclick="sendOrder('ببجي', '660 شدة', '125')">اطلب الآن ⚡</button></div>
        </div>
    </div>

    <div id="payment" class="section">
        <h2>طرق الدفع المدعومة 💳</h2>
        <div class="grid" style="grid-template-columns: repeat(2, 1fr);">
            <div class="card">🏦 تحويل بنكي</div>
            <div class="card">💳 سداد / تداول</div>
            <div class="card">🅿️ PayPal</div>
            <div class="card">🔗 USDT</div>
        </div>
        <div style="text-align: center; margin-top: 20px; color: var(--primary);">للتواصل: 0934551020</div>
    </div>
</div>

<a href="https://wa.me/218934551020" class="wa-float"><img src="https://img.icons8.com/color/48/whatsapp.png"></a>

<script>
    function openTab(evt, tabName) {
        var i, section, tablinks;
        section = document.getElementsByClassName("section");
        for (i = 0; i < section.length; i++) { section[i].style.display = "none"; }
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) { tablinks[i].className = tablinks[i].className.replace(" active", ""); }
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
    }
    function sendOrder(game, item, price) {
        const id = prompt("أدخل رقم الـ ID الخاص بك:");
        if (id) {
            const msg = `طلب شحن من KARLO STORE 📢:\nالخدمة: ${game}\nالمنتج: ${item}\nالسعر: ${price} د.ل\nالآيدي: ${id}`;
            window.location.href = `https://wa.me/218934551020?text=${encodeURIComponent(msg)}`;
        }
    }
</script>
</body>
</html>
